<!doctype html><html lang="da"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>NAC Backend</title><meta name="theme-color" content="#000000"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="NAC Backend"><link rel="manifest" href="/admin.webmanifest"><link rel="icon" href="/favicon.ico"><link rel="apple-touch-icon" href="/apple-touch-icon.png"><style>
:root{--bg:#030303;--panel:#070604;--line:#8c5b2d;--line2:rgba(196,133,70,.55);--gold:#d2934e;--gold2:#f2be75;--muted:#bdb7b3;--text:#f5f0ea;--danger:#d75b4f;--green:#7ed69b}*{box-sizing:border-box}html{background:#000;color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{margin:0;background:radial-gradient(circle at 50% -10%,rgba(177,105,41,.25),transparent 35%),#000;min-height:100vh}.app{max-width:880px;margin:0 auto;padding:24px 18px 140px}.mini{letter-spacing:.38em;text-transform:uppercase;color:var(--gold2);font-size:12px;font-weight:800}.title{font-size:clamp(38px,10vw,76px);line-height:.94;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin:10px 0 18px;font-weight:900}.lead{font-size:20px;line-height:1.65;color:var(--muted);margin:0 0 26px}.card{border:1px solid var(--line2);border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.005));box-shadow:0 0 28px rgba(191,115,50,.12);padding:22px;margin:18px 0}.grid{display:grid;gap:14px}.two{grid-template-columns:repeat(2,minmax(0,1fr))}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.btn{border:1px solid var(--line2);background:#050403;color:var(--text);border-radius:18px;padding:14px 16px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}.btn.gold,.selected{background:linear-gradient(135deg,#f0bd74,#c67d35);color:#080604;border-color:transparent}.btn.small{font-size:12px;padding:10px 12px;border-radius:14px}.input,select,textarea{width:100%;border:1px solid rgba(196,133,70,.35);background:#030303;color:var(--text);border-radius:16px;padding:14px 14px;font-size:16px}label{display:block;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;font-size:12px;font-weight:900;margin:12px 0 8px}h2{letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-size:24px;margin:10px 0 14px}h3{color:var(--gold2);text-transform:uppercase;letter-spacing:.12em}.row{display:flex;gap:10px;align-items:center;justify-content:space-between}.muted{color:var(--muted)}.price{font-size:34px;color:var(--gold);font-weight:900}.pill{display:inline-flex;border:1px solid rgba(196,133,70,.45);border-radius:999px;padding:8px 12px;color:var(--gold2);font-weight:900;letter-spacing:.1em;text-transform:uppercase;font-size:12px}.package{cursor:pointer}.package ul{color:var(--muted);line-height:1.55;padding-left:20px}.check{display:flex;gap:10px;align-items:flex-start;border:1px solid rgba(196,133,70,.35);border-radius:18px;padding:14px}.check input{width:22px;height:22px;accent-color:#d2934e}.footer-card{position:fixed;left:12px;right:12px;bottom:12px;z-index:20;max-width:850px;margin:auto;border:1px solid rgba(196,133,70,.65);border-radius:28px;background:rgba(0,0,0,.94);box-shadow:0 -10px 40px rgba(0,0,0,.65);padding:14px}.footer-card.open{max-height:78vh;overflow:auto}.hidden{display:none!important}.logo{display:flex;justify-content:center;margin:28px 0}.logo img{width:min(420px,80vw);height:auto}.hero{text-align:center;padding:20px 0}.dock{position:fixed;left:12px;right:12px;bottom:12px;z-index:40;max-width:850px;margin:auto;border:1px solid rgba(196,133,70,.65);border-radius:26px;background:#020202;padding:10px;display:flex;gap:8px;overflow-x:auto}.dock button{min-width:106px;white-space:nowrap}.admin-pad{padding-bottom:120px}.order-card details,.module details,details{border:1px solid rgba(196,133,70,.45);border-radius:20px;padding:14px;background:rgba(255,255,255,.02);margin:12px 0}summary{cursor:pointer;font-weight:900;color:var(--gold2);letter-spacing:.08em;text-transform:uppercase}.split{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:700px){.two,.three,.split{grid-template-columns:1fr}.app{padding:18px 14px 130px}.card{padding:18px;border-radius:24px}.title{font-size:42px}.lead{font-size:18px}.dock{left:8px;right:8px}.dock button{min-width:96px;font-size:11px}.footer-card{left:8px;right:8px}.row{align-items:flex-start;flex-direction:column}.row.keep{flex-direction:row;align-items:center}.price{font-size:28px}}
</style></head><body><div class="app admin-pad"><p class="mini">Backend</p><h1 class="title">Nordic<br>Admin</h1><div id="stats" class="grid three"></div><main id="view"></main></div><nav class="dock" id="dock"></nav><script>
const PACKAGES=[{id:"basis",title:"Basis pakke",price:599,items:["Udvendig håndvask","Støvsugning","Aftørring af kabine","Rudepudsning"]},{id:"premium",title:"Premium pakke",price:1199,items:["Komplet rengøring inde & ude","Fælgrens","Dækpleje","Lakforsegling"]},{id:"deluxe",title:"Deluxe pakke",price:2499,items:["Komplet rengøring","1-trins polering","Lakforsegling","Fælgrens og dækpleje"]},{id:"ultimate",title:"Ultimate pakke",price:5999,items:["Komplet rengøring","2-trins polering","Keramisk coating","Fælgrens","Dækpleje","Lakbeskyttelse"]}];
const SERVICES=[{id:"handwash",name:"Udvendig håndvask",price:249,description:"Skånsom udvendig vask."},{id:"inside",name:"Indvendig rengøring",price:399,description:"Kabine, støvsugning og aftørring."},{id:"complete",name:"Komplet rengøring inde & ude",price:599,description:"Samlet klargøring."},{id:"fabric",name:"Sæderens (stof)",price:499,description:"Rens af stofsæder."},{id:"leather",name:"Læderrens og pleje",price:599,description:"Pleje og rens af læder."},{id:"engine",name:"Motorrumsrens",price:299,description:"Skånsom rengøring af motorrum."},{id:"wheels",name:"Fælgrens og dækpleje",price:199,description:"Fælge og dæk finish."},{id:"paintclean",name:"Lakrens",price:699,description:"Forbedrer lak og glans."},{id:"one-step",name:"1-trins polering",price:1499,description:"Polering for flottere finish."},{id:"two-step",name:"2-trins polering",price:2499,description:"Grundigere lakforbedring."},{id:"ceramic",name:"Keramisk coating",price:3999,description:"Langvarig lakbeskyttelse."},{id:"hair",name:"Fjernelse af hundehår",price:299,description:"Tillæg for hundehår."},{id:"odor",name:"Lugtfjernelse / Ozonbehandling",price:499,description:"Behandling mod lugt."}];
const EXTRAS=[{id:"dirty",name:"Ekstra beskidt bil",price:200,description:"Fra 200 kr. afhængigt af stand."},{id:"suv",name:"Stor SUV / Varevogn",price:300,description:"Tillæg for større bil."},{id:"pet",name:"Dyrehår",price:299,description:"Ekstra behandling ved dyrehår."},{id:"tar",name:"Tjære- og flyverustbehandling",price:399,description:"Ekstra lakbehandling."}];
const ORDER_KEY="nordic-auto-care-orders-v2",INVOICE_KEY="nordic-auto-care-invoices-v1",SERVICES_KEY="nordic-auto-care-service-drafts-v1",COMPANY_KEY="nordic-auto-care-company-info-v1";
function money(n){return `${Number(n||0).toLocaleString("da-DK")} kr.`}function load(k,f){try{return JSON.parse(localStorage.getItem(k)||"")||f}catch{return f}}function save(k,v){localStorage.setItem(k,JSON.stringify(v))}function uid(p="id"){return p+"-"+Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,7)}function publishedServices(){const d=load(SERVICES_KEY,{packages:PACKAGES,services:SERVICES,extras:EXTRAS});return {packages:d.packages||PACKAGES,services:d.services||SERVICES,extras:d.extras||EXTRAS}}function calcCar(car){const d=publishedServices();let t=0;const p=d.packages.find(x=>x.id===car.packageId);if(p)t+=p.price;(car.services||[]).forEach(id=>{const s=d.services.find(x=>x.id===id);if(s)t+=s.price});(car.extras||[]).forEach(id=>{const e=d.extras.find(x=>x.id===id);if(e)t+=e.price});return t}function calcOrder(o){return (o.cars||[]).reduce((a,c)=>a+calcCar(c),0)}function emailHref(to,subject,body){return `mailto:${encodeURIComponent(to||"")}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`}function orderText(o){return `Hej ${o.customer?.name||""}

Tak for din forespørgsel hos Nordic Auto Care.

Ordre: ${o.id}
Dato/tid: ${o.preferredDate||o.adminDate||""} ${o.preferredTime||o.adminTime||""}
Total: ${money(calcOrder(o))}

Biler:
${(o.cars||[]).map((c,i)=>`${i+1}. ${c.type||""} ${c.makeModel||""} ${c.reg||""} - ${money(calcCar(c))}`).join("
")}

Venlig hilsen
Nordic Auto Care`}

const views=[["new","Nye"],["calendar","Kalender"],["invoices","Faktura"],["completed","Færdige"],["services","Ydelser"],["company","Firma"],["backup","Backup"]];let current=location.hash.replace("#","")||"new";function setView(v){current=v;location.hash=v;render()}function allOrders(){return load(ORDER_KEY,[])}function setOrders(o){save(ORDER_KEY,o)}function allInvoices(){return load(INVOICE_KEY,[])}function setInvoices(i){save(INVOICE_KEY,i)}function updateOrder(id,patch){setOrders(allOrders().map(o=>o.id===id?{...o,...patch,activity:[...(o.activity||[]),`Opdateret ${new Date().toLocaleString("da-DK")}`]}:o));render()}function acceptOrder(id){const o=allOrders().find(x=>x.id===id);if(!o)return;updateOrder(id,{status:"Bekræftet"});location.href=emailHref(o.customer.email,"Din ordre hos Nordic Auto Care",orderText(o))}function statusSelect(o){const ss=["Ny","Bekræftet","Planlagt","I gang","Udført","Faktura sendt","Betaling modtaget","Annulleret"];return `<select onchange="updateOrder('${o.id}',{status:this.value})">${ss.map(s=>`<option ${o.status===s?"selected":""}>${s}</option>`).join("")}</select>`}function orderCard(o,actions=""){return `<details><summary>${o.customer?.name||"Ukendt"} · ${o.preferredDate||o.adminDate||"Ingen dato"} · ${money(calcOrder(o))}</summary><div class="card"><p><b>Status:</b> ${statusSelect(o)}</p><p><b>Kontakt:</b> ${o.customer?.name||""} · ${o.customer?.phone||""} · ${o.customer?.email||""}</p><p><b>Faktura:</b> ${o.invoice?.invoiceType||""} ${o.invoice?.company||""} ${o.invoice?.cvr||""}</p><div class="split"><div><label>Dato</label><input class="input" type="date" value="${o.adminDate||o.preferredDate||""}" onchange="updateOrder('${o.id}',{adminDate:this.value})"></div><div><label>Tid</label><input class="input" type="time" value="${o.adminTime||o.preferredTime||""}" onchange="updateOrder('${o.id}',{adminTime:this.value})"></div></div><label>Interne noter</label><textarea rows="3" onchange="updateOrder('${o.id}',{adminNotes:this.value})">${o.adminNotes||""}</textarea>${(o.cars||[]).map((c,i)=>`<div class="card"><h3>Bil ${i+1}</h3><p>${c.type} · ${c.makeModel} · ${c.reg}</p><p>Pris: ${money(calcCar(c))}</p><p class="muted">${c.notes||""}</p></div>`).join("")}${actions}</div></details>`}function renderStats(){const os=allOrders(),inv=allInvoices();stats.innerHTML=`<div class="card"><p class="mini">Nye</p><div class="price">${os.filter(o=>o.status==="Ny").length}</div></div><div class="card"><p class="mini">Værdi</p><div class="price">${money(os.reduce((a,o)=>a+calcOrder(o),0))}</div></div><div class="card"><p class="mini">Ikke betalt</p><div class="price">${money(inv.filter(i=>i.status!=="Betalt").reduce((a,i)=>a+i.lines.reduce((s,l)=>s+l.qty*l.price,0),0))}</div></div>`}function renderNew(){const os=allOrders().filter(o=>o.status==="Ny");view.innerHTML=`<p class="mini">New orders</p><h2>Nye forespørgsler</h2>${os.length?os.map(o=>orderCard(o,`<button class="btn gold" onclick="acceptOrder('${o.id}')">Acceptér og send email</button>`)).join(""):`<div class="card muted">Ingen nye ordrer lige nu.</div>`}`}function renderCalendar(){const os=allOrders().filter(o=>!["Ny","Betaling modtaget","Annulleret"].includes(o.status)).sort((a,b)=>`${a.adminDate||a.preferredDate} ${a.adminTime||a.preferredTime}`.localeCompare(`${b.adminDate||b.preferredDate} ${b.adminTime||b.preferredTime}`));view.innerHTML=`<p class="mini">Calendar</p><h2>Planlagte ordrer</h2>${os.map(o=>orderCard(o)).join("")||'<div class="card muted">Ingen accepterede ordrer.</div>'}`}function makeInvoice(id){const o=allOrders().find(x=>x.id===id);if(!o)return;const invs=allInvoices();invs.unshift({id:uid("INV"),orderId:o.id,invoiceNo:"NAC-"+(invs.length+1).toString().padStart(4,"0"),createdAt:new Date().toISOString(),dueDate:"",customerName:o.customer.name,email:o.invoice.invoiceEmail||o.customer.email,invoiceAddress:o.invoice.invoiceAddress||o.customer.address,company:o.invoice.company,cvr:o.invoice.cvr,status:"Kladde",note:"",lines:(o.cars||[]).map((c,i)=>({id:uid("line"),text:`Bil ${i+1} ${c.makeModel||""} ${c.reg||""}`,qty:1,price:calcCar(c)}))});setInvoices(invs);render()}function sendInvoice(id){const inv=allInvoices().find(i=>i.id===id);if(!inv)return;setInvoices(allInvoices().map(i=>i.id===id?{...i,status:"Sendt",sentAt:new Date().toISOString()}:i));updateOrder(inv.orderId,{status:"Faktura sendt",paymentStatus:"Faktura sendt"});location.href=emailHref(inv.email,`Faktura ${inv.invoiceNo} fra Nordic Auto Care`,`Hej ${inv.customerName}

Hermed faktura ${inv.invoiceNo}.
Beløb: ${money(inv.lines.reduce((a,l)=>a+l.qty*l.price,0))}

Venlig hilsen
Nordic Auto Care`)}function markPaid(id){const inv=allInvoices().find(i=>i.id===id);setInvoices(allInvoices().map(i=>i.id===id?{...i,status:"Betalt",paidAt:new Date().toISOString()}:i));if(inv)updateOrder(inv.orderId,{status:"Betaling modtaget",paymentStatus:"Betalt"})}function renderInvoices(){const os=allOrders().filter(o=>["Bekræftet","Planlagt","I gang","Udført","Faktura sendt"].includes(o.status));const invs=allInvoices();view.innerHTML=`<p class="mini">Invoices</p><h2>Faktura</h2><h3>Ordrer klar til faktura</h3>${os.map(o=>orderCard(o,`<button class="btn gold" onclick="makeInvoice('${o.id}')">Opret faktura</button>`)).join("")||'<div class="card muted">Ingen bekræftede ordrer.</div>'}<h3>Fakturaer</h3>${invs.map(i=>`<details><summary>${i.invoiceNo} · ${i.customerName} · ${i.status} · ${money(i.lines.reduce((a,l)=>a+l.qty*l.price,0))}</summary><div class="card"><label>Email</label><input class="input" value="${i.email}" onchange="setInvoices(allInvoices().map(x=>x.id==='${i.id}'?{...x,email:this.value}:x));render()"><label>Status</label><select onchange="setInvoices(allInvoices().map(x=>x.id==='${i.id}'?{...x,status:this.value}:x));render()"><option>Kladde</option><option>Sendt</option><option>Betalt</option><option>Forfalden</option><option>Annulleret</option></select>${i.lines.map(l=>`<p>${l.text} · ${l.qty} x ${money(l.price)}</p>`).join("")}<button class="btn gold" onclick="sendInvoice('${i.id}')">Send faktura</button><button class="btn" onclick="markPaid('${i.id}')">Marker betalt</button></div></details>`).join("")}`}function renderCompleted(){const os=allOrders().filter(o=>["Faktura sendt","Betaling modtaget"].includes(o.status));view.innerHTML=`<p class="mini">Completed</p><h2>Færdige ordrer</h2><h3>Faktura sendt</h3>${os.filter(o=>o.status==="Faktura sendt").map(o=>orderCard(o)).join("")||'<div class="card muted">Ingen.</div>'}<h3>Betaling modtaget</h3>${os.filter(o=>o.status==="Betaling modtaget").map(o=>orderCard(o)).join("")||'<div class="card muted">Ingen.</div>'}`}function renderServices(){const d=publishedServices();view.innerHTML=`<p class="mini">Services</p><h2>Ydelser</h2><div class="card"><button class="btn gold" onclick="save('${SERVICES_KEY}',{packages:PACKAGES,services:SERVICES,extras:EXTRAS});render()">Nulstil ydelser</button></div><h3>Pakker</h3>${d.packages.map(p=>`<details><summary>${p.title} · ${money(p.price)}</summary><div class="card"><label>Navn</label><input class="input" value="${p.title}" onchange="p.title=this.value;save('${SERVICES_KEY}',d)"><label>Pris</label><input class="input" type="number" value="${p.price}" onchange="p.price=+this.value;save('${SERVICES_KEY}',d)"><p class="muted">${p.items.join(', ')}</p></div></details>`).join("")}<h3>Ydelser</h3>${d.services.map(s=>`<details><summary>${s.name} · ${money(s.price)}</summary><div class="card"><label>Navn</label><input class="input" value="${s.name}" onchange="s.name=this.value;save('${SERVICES_KEY}',d)"><label>Pris</label><input class="input" type="number" value="${s.price}" onchange="s.price=+this.value;save('${SERVICES_KEY}',d)"><label>Beskrivelse</label><textarea onchange="s.description=this.value;save('${SERVICES_KEY}',d)">${s.description||""}</textarea></div></details>`).join("")}`}function renderCompany(){const c=load(COMPANY_KEY,{name:"Nordic Auto Care",phone:"81912674",email:"nordicacare.2026@gmail.com",openingHours:"Åben 8-20 hver dag",invoiceName:"Nordic Auto Care",cvr:"",invoiceEmail:"nordicacare.2026@gmail.com",invoiceAddress:"",paymentTerms:"8 dage",bankInfo:""});view.innerHTML=`<p class="mini">Company information</p><h2>Firmaoplysninger</h2><div class="card">${["name","phone","email","openingHours","invoiceName","cvr","invoiceEmail","invoiceAddress","paymentTerms","bankInfo"].map(k=>`<label>${k}</label><input class="input" value="${c[k]||""}" onchange="const c=load('${COMPANY_KEY}',{});c['${k}']=this.value;save('${COMPANY_KEY}',c)">`).join("")}</div>`}function renderBackup(){view.innerHTML=`<p class="mini">Backup</p><h2>Backup</h2><div class="card"><button class="btn gold" onclick="downloadBackup()">Download JSON</button><label>Importer JSON</label><textarea id="importBox" rows="8"></textarea><button class="btn" onclick="importBackup()">Importer</button></div>`}function downloadBackup(){const data={orders:allOrders(),invoices:allInvoices(),services:load(SERVICES_KEY,null),company:load(COMPANY_KEY,null)};const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}));a.download="nac-backup.json";a.click()}function importBackup(){try{const d=JSON.parse(importBox.value);if(d.orders)save(ORDER_KEY,d.orders);if(d.invoices)save(INVOICE_KEY,d.invoices);if(d.services)save(SERVICES_KEY,d.services);if(d.company)save(COMPANY_KEY,d.company);render()}catch(e){alert("Kunne ikke importere JSON")}}function render(){renderStats();dock.innerHTML=views.map(v=>`<button class="btn small ${current===v[0]?"gold":""}" onclick="setView('${v[0]}')">${v[1]}</button>`).join("");if(current==="new")renderNew();if(current==="calendar")renderCalendar();if(current==="invoices")renderInvoices();if(current==="completed")renderCompleted();if(current==="services")renderServices();if(current==="company")renderCompany();if(current==="backup")renderBackup()}window.addEventListener("hashchange",()=>{current=location.hash.replace("#","")||"new";render()});render();</script></body></html>
